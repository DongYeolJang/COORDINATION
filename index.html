    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      -webkit-overflow-scrolling: touch;
    }
    
    body {
      font-family: 'Georgia', serif;
      overscroll-behavior: none;
      padding-top: env(safe-area-inset-top);
    }
    
    body.theme-dark {
      background: #0a0a0a;
      color: #f5f0e8;
    }
    
    body.theme-light {
      background: #fafafa;
      color: #1a1a1a;
    }
    
    body.theme-blue {
      background: #0f1419;
      color: #e7f0ff;
    }
    
    body.theme-forest {
      background: #0d1b0d;
      color: #e8f5e8;
    }
    
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }
    
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #0f0f0f;
      --bg-tertiary: #151515;
      --text-primary: #f5f0e8;
      --text-secondary: #999;
      --text-tertiary: #666;
      --border-color: #222;
      --accent-color: #c9a96e;
      --accent-hover: #a8864a;
    }
    
    body.theme-light {
      --bg-primary: #fafafa;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f0f0f0;
      --text-primary: #1a1a1a;
      --text-secondary: #666;
      --text-tertiary: #999;
      --border-color: #e0e0e0;
      --accent-color: #c9a96e;
      --accent-hover: #a8864a;
    }
    
    body.theme-blue {
      --bg-primary: #0f1419;
      --bg-secondary: #1a1f26;
      --bg-tertiary: #252b33;
      --text-primary: #e7f0ff;
      --text-secondary: #8899aa;
      --text-tertiary: #556677;
      --border-color: #2a3340;
      --accent-color: #5ea3d0;
      --accent-hover: #4a8ab8;
    }
    
    body.theme-forest {
      --bg-primary: #0d1b0d;
      --bg-secondary: #162616;
      --bg-tertiary: #1f311f;
      --text-primary: #e8f5e8;
      --text-secondary: #99bb99;
      --text-tertiary: #667766;
      --border-color: #2a3d2a;
      --accent-color: #7cb87c;
      --accent-hover: #6a9d6a;
    }
    
    .app-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    
    .scrollable {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    
    .tab-btn {
      cursor: pointer;
      letter-spacing: 0.2em;
      transition: all 0.3s;
      border: none;
      background: none;
      -webkit-tap-highlight-color: transparent;
    }
    
    .tab-btn:hover { opacity: 0.7; }
    .tab-btn:active { transform: scale(0.95); }
    
    .cat-btn, .season-btn, .ai-btn, .add-item-btn {
      cursor: pointer;
      transition: all 0.3s;
      border: none;
      -webkit-tap-highlight-color: transparent;
    }
    
    .cat-btn:hover { transform: translateY(-2px); }
    .cat-btn:active { transform: scale(0.95); }
    
    .item-card {
      position: relative;
      overflow: hidden;
      border-radius: 4px;
    }
    
    .item-card:hover .delete-btn { opacity: 1; }
    
    .delete-btn {
      opacity: 0;
      transition: opacity 0.2s;
    }
    
    @media (hover: none) {
      .delete-btn { opacity: 1; }
    }
    
    .upload-zone {
      transition: all 0.3s;
      cursor: pointer;
    }
    
    .upload-zone:hover {
      border-color: var(--accent-color) !important;
      background: color-mix(in srgb, var(--accent-color) 5%, transparent) !important;
    }
    
    .season-btn:hover { transform: scale(1.02); }
    .season-btn:active { transform: scale(0.98); }
    
    .outfit-card {
      animation: fadeUp 0.5s ease both;
    }
    
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .outfit-card:nth-child(2) { animation-delay: 0.1s; }
    .outfit-card:nth-child(3) { animation-delay: 0.2s; }
    
    .ai-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px color-mix(in srgb, var(--accent-color) 40%, transparent);
    }
    
    .ai-btn:active:not(:disabled) { transform: scale(0.98); }
    .ai-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    
    .pulse {
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: var(--bg-primary);
    }
    
    .auth-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 40px;
      max-width: 400px;
      width: 100%;
    }
    
    .auth-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 2px;
      color: var(--text-primary);
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      margin-bottom: 12px;
      transition: all 0.3s;
    }
    
    .auth-input:focus {
      outline: none;
      border-color: var(--accent-color);
      background: var(--bg-tertiary);
    }
    
    .auth-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
      color: var(--bg-primary);
      border: none;
      border-radius: 2px;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 10px;
    }
    
    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px color-mix(in srgb, var(--accent-color) 40%, transparent);
    }
    
    .auth-btn:active { transform: scale(0.98); }
    
    .auth-btn.secondary {
      background: var(--bg-tertiary);
      color: var(--accent-color);
      border: 1px solid var(--accent-color);
    }
    
    .error-msg {
      color: #ff6b6b;
      font-family: 'Montserrat', sans-serif;
      font-size: 11px;
      text-align: center;
      margin-top: 10px;
    }
    
    .user-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 2px;
    }
    
    .logout-btn {
      padding: 6px 12px;
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
      border-radius: 2px;
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .logout-btn:hover {
      border-color: var(--accent-color);
      color: var(--accent-color);
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
      animation: fadeIn 0.2s ease;
      overflow-y: auto;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 32px;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
      margin: auto;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
      gap: 8px;
      margin: 16px 0;
    }

    .icon-btn {
      padding: 12px;
      background: var(--bg-primary);
      border: 2px solid var(--border-color);
      border-radius: 4px;
      font-size: 24px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .icon-btn:hover {
      border-color: var(--accent-color);
      background: var(--bg-tertiary);
    }

    .icon-btn.selected {
      border-color: var(--accent-color);
      background: var(--bg-tertiary);
    }

    .edit-cat-btn, .delete-cat-btn {
      padding: 4px 8px;
      background: transparent;
      border: 1px solid var(--border-color);
      border-radius: 2px;
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: 4px;
    }

    .edit-cat-btn:hover {
      border-color: var(--accent-color);
      color: var(--accent-color);
    }

    .delete-cat-btn:hover {
      border-color: #f55;
      color: #f55;
    }

    .add-item-btn {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--accent-color);
      border-radius: 2px;
      color: var(--accent-color);
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .add-item-btn:hover {
      background: var(--accent-color);
      color: var(--bg-primary);
      transform: translateY(-1px);
    }

    .season-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border: 1px solid var(--border-color);
      border-radius: 2px;
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--bg-primary);
    }

    .season-tag.selected {
      border-color: var(--accent-color);
      background: var(--accent-color);
      color: var(--bg-primary);
    }

    .season-tag:hover {
      border-color: var(--accent-color);
    }

    .preview-image {
      width: 100%;
      max-height: 300px;
      object-fit: contain;
      border-radius: 4px;
      background: var(--bg-primary);
      margin-bottom: 16px;
    }

    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .meta-tag {
      padding: 3px 8px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 2px;
      font-family: 'Montserrat', sans-serif;
      font-size: 8px;
      letter-spacing: 0.1em;
      color: var(--text-secondary);
    }

    .category-edit-item {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .category-edit-item:hover {
      border-color: var(--accent-color);
    }

    .ref-image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
      margin: 16px 0;
    }

    .ref-image-item {
      position: relative;
      aspect-ratio: 1;
      border-radius: 4px;
      overflow: hidden;
      border: 2px solid var(--border-color);
      cursor: pointer;
    }

    .ref-image-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .ref-image-remove {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(0,0,0,0.8);
      color: #fff;
      border: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 12px;
    }

    .theme-selector {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 16px 0;
    }

    .theme-option {
      padding: 16px;
      border: 2px solid var(--border-color);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .theme-option:hover {
      border-color: var(--accent-color);
    }

    .theme-option.selected {
      border-color: var(--accent-color);
      background: var(--bg-tertiary);
    }

    .color-input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .color-input-group > div {
      flex: 1;
    }
    
    @media (max-width: 768px) {
      .auth-box { padding: 30px 20px; }
      .modal-box { padding: 24px 16px; }
      .user-badge {
        flex-direction: column;
        gap: 4px;
      }
      body {
        padding-top: max(20px, env(safe-area-inset-top));
      }
    }
  </style>

    // Apply theme
    function applyTheme(theme) {
      document.body.className = `theme-${theme}`;
    }

    function render() {
      const root = document.getElementById('root');
      
      if (!state.user) {
        root.innerHTML = renderAuth();
        attachAuthListeners();
      } else {
        root.innerHTML = renderApp();
        attachAppListeners();
      }
    }

    function renderAuth() {
      const isLogin = state.authMode === 'login';
      return `
        <div class="auth-container">
          <div class="auth-box">
            <div style="text-align: center; margin-bottom: 32px;">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="80" height="80" style="margin-bottom: 16px;">
                <defs>
                  <linearGradient id="gradient" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0" stop-color="var(--accent-color)"/>
                    <stop offset="1" stop-color="var(--accent-hover)"/>
                  </linearGradient>
                </defs>
                <path d="M60 28c-14 0-23 7-23 19v45h46V47c0-12-9-19-23-19z" fill="url(#gradient)"/>
                <rect x="37" y="47" width="19" height="45" fill="var(--bg-primary)" opacity="0.15"/>
                <rect x="64" y="47" width="19" height="45" fill="var(--bg-primary)" opacity="0.15"/>
                <path d="M47 28h26c2 0 4 2 4 4s-2 3-4 3H47c-2 0-4-1-4-3s2-4 4-4z" fill="var(--accent-color)"/>
                <circle cx="47" cy="42" r="2" fill="var(--accent-color)"/>
                <circle cx="60" cy="42" r="2" fill="var(--accent-color)"/>
                <circle cx="73" cy="42" r="2" fill="var(--accent-color)"/>
              </svg>
              <div style="font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 0.4em; color: var(--accent-color); margin-bottom: 4px;">MY PERSONAL</div>
              <div style="font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 300;">Wardrobe</div>
            </div>
            
            <input 
              type="email" 
              class="auth-input" 
              id="emailInput" 
              placeholder="EMAIL" 
              value="${state.email}"
              autocomplete="email"
            />
            <input 
              type="password" 
              class="auth-input" 
              id="passwordInput" 
              placeholder="PASSWORD" 
              value="${state.password}"
              autocomplete="${isLogin ? 'current-password' : 'new-password'}"
            />
            
            <button class="auth-btn" id="primaryAuthBtn">
              ${isLogin ? '✦ 로그인' : '✦ 회원가입'}
            </button>
            
            <button class="auth-btn secondary" id="googleAuthBtn">
              G Google로 ${isLogin ? '로그인' : '가입'}
            </button>
            
            <div style="text-align: center; margin-top: 20px;">
              <button 
                id="toggleAuthMode" 
                style="background: none; border: none; color: var(--text-secondary); font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 0.1em; cursor: pointer; text-decoration: underline;"
              >
                ${isLogin ? '계정이 없으신가요? 회원가입' : '이미 계정이 있으신가요? 로그인'}
              </button>
            </div>
            
            ${state.error ? `<div class="error-msg">${state.error}</div>` : ''}
          </div>
        </div>
      `;
    }

    function renderApp() {
      const currentItems = state.wardrobe[state.activeCategory] || [];
      const totalItems = Object.values(state.wardrobe).flat().length;
      const season = SEASONS.find(s => s.id === state.activeSeason);
      const currentOutfits = state.outfits[state.activeSeason] || [];

      return `
        <div class="app-container">
          <header style="padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color); flex-shrink: 0;">
            <div>
              <div style="font-family: 'Montserrat', sans-serif; font-size: 9px; letter-spacing: 0.4em; color: var(--accent-color); margin-bottom: 2px;">MY PERSONAL</div>
              <div style="font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300;">Wardrobe</div>
            </div>
            <div class="user-badge">
              <div style="font-family: 'Montserrat', sans-serif; font-size: 10px; color: var(--text-secondary);">${state.user.email}</div>
            </div>
          </header>

          <nav style="display: flex; gap: 0; border-bottom: 1px solid var(--border-color); background: var(--bg-primary); flex-shrink: 0;">
            <button 
              class="tab-btn" 
              data-tab="wardrobe"
              style="flex: 1; padding: 18px; font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: ${state.tab === 'wardrobe' ? '600' : '400'}; color: ${state.tab === 'wardrobe' ? 'var(--accent-color)' : 'var(--text-tertiary)'}; border-bottom: ${state.tab === 'wardrobe' ? '2px solid var(--accent-color)' : '2px solid transparent'};"
            >
              CLOSET
            </button>
            <button 
              class="tab-btn" 
              data-tab="outfit"
              style="flex: 1; padding: 18px; font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: ${state.tab === 'outfit' ? '600' : '400'}; color: ${state.tab === 'outfit' ? 'var(--accent-color)' : 'var(--text-tertiary)'}; border-bottom: ${state.tab === 'outfit' ? '2px solid var(--accent-color)' : '2px solid transparent'};"
            >
              OUTFIT AI
            </button>
            <button 
              class="tab-btn" 
              data-tab="categories"
              style="flex: 1; padding: 18px; font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: ${state.tab === 'categories' ? '600' : '400'}; color: ${state.tab === 'categories' ? 'var(--accent-color)' : 'var(--text-tertiary)'}; border-bottom: ${state.tab === 'categories' ? '2px solid var(--accent-color)' : '2px solid transparent'};"
            >
              CATEGORIES
            </button>
            <button 
              class="tab-btn" 
              data-tab="settings"
              style="flex: 1; padding: 18px; font-family: 'Montserrat', sans-serif; font-size: 10px; font-weight: ${state.tab === 'settings' ? '600' : '400'}; color: ${state.tab === 'settings' ? 'var(--accent-color)' : 'var(--text-tertiary)'}; border-bottom: ${state.tab === 'settings' ? '2px solid var(--accent-color)' : '2px solid transparent'};"
            >
              SETTINGS
            </button>
          </nav>

          <div class="scrollable">
            ${state.tab === 'wardrobe' ? renderWardrobe(currentItems, totalItems) : 
              state.tab === 'outfit' ? renderOutfit(season, currentOutfits, totalItems) :
              state.tab === 'categories' ? renderCategories() :
              renderSettings()}
          </div>

          ${state.modal ? renderModal() : ''}
        </div>
      `;
    }

    function renderWardrobe(currentItems, totalItems) {
      return `
        <div style="padding: 24px; padding-bottom: 60px;">
          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;">
            <div style="font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300;">
              Your Collection
            </div>
            <div style="display: flex; align-items: center; gap: 12px;">
              <div style="font-family: 'Montserrat', sans-serif; font-size: 11px; color: var(--text-tertiary); letter-spacing: 0.15em;">
                ${totalItems} ITEMS
              </div>
              <button class="add-item-btn" id="addItemBtn">
                <span style="font-size: 14px;">+</span>
                <span>ADD</span>
              </button>
            </div>
          </div>

          <div style="display: flex; gap: 8px; overflow-x: auto; margin-bottom: 24px; padding-bottom: 8px; -webkit-overflow-scrolling: touch;">
            ${state.categories.map(cat => `
              <button 
                class="cat-btn" 
                data-category="${cat.id}"
                style="
                  flex-shrink: 0;
                  padding: 12px 20px;
                  background: ${state.activeCategory === cat.id ? 'var(--bg-tertiary)' : 'var(--bg-secondary)'};
                  border: 1px solid ${state.activeCategory === cat.id ? 'var(--accent-color)' : 'var(--border-color)'};
                  border-radius: 2px;
                  color: ${state.activeCategory === cat.id ? 'var(--accent-color)' : 'var(--text-tertiary)'};
                  display: flex;
                  align-items: center;
                  gap: 8px;
                "
              >
                <span style="font-size: 18px;">${cat.icon}</span>
                <span style="font-family: 'Montserrat', sans-serif; font-size: 9px; letter-spacing: 0.15em;">
                  ${cat.label}
                </span>
                ${(state.wardrobe[cat.id] || []).length > 0 ? `
                  <span style="
                    font-family: 'Montserrat', sans-serif;
                    font-size: 8px;
                    background: ${state.activeCategory === cat.id ? 'var(--accent-color)' : 'var(--border-color)'};
                    color: ${state.activeCategory === cat.id ? 'var(--bg-primary)' : 'var(--text-tertiary)'};
                    padding: 2px 6px;
                    border-radius: 10px;
                    margin-left: 4px;
                  ">
                    ${(state.wardrobe[cat.id] || []).length}
                  </span>
                ` : ''}
              </button>
            `).join('')}
          </div>

          <main>
            ${currentItems.length === 0 ? `
              <div style="text-align: center; padding: 60px 0; color: var(--text-tertiary);">
                <div style="font-family: 'Cormorant Garamond', serif; font-size: 20px; margin-bottom: 8px;">
                  Empty Category
                </div>
                <div style="font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 0.2em; margin-bottom: 16px;">
                  ADD YOUR FIRST ${state.activeCategory} ITEM
                </div>
                <button class="add-item-btn" onclick="document.getElementById('addItemBtn').click()" style="margin: 0 auto;">
                  <span style="font-size: 14px;">+</span>
                  <span>ADD ITEM</span>
                </button>
              </div>
            ` : `
              <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px;">
                ${currentItems.map(item => `
                  <div class="item-card">
                    <img 
                      src="${item.src}" 
                      alt="${item.name}" 
                      style="width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; background: var(--bg-tertiary);"
                    />
                    <button 
                      class="delete-btn" 
                      data-item-id="${item.id}"
                      style="
                        position: absolute;
                        top: 8px;
                        right: 8px;
                        background: rgba(0,0,0,0.7);
                        color: #fff;
                        border: none;
                        width: 26px;
                        height: 26px;
                        border-radius: 50%;
                        cursor: pointer;
                        font-size: 12px;
                      "
                    >×</button>
                    <div style="padding: 8px; background: var(--bg-tertiary);">
                      <div style="
                        font-family: 'Montserrat', sans-serif;
                        font-size: 9px;
                        letter-spacing: 0.1em;
                        color: var(--text-secondary);
                        overflow: hidden;
                        text-overflow: ellipsis;
                        white-space: nowrap;
                      ">
                        ${item.name}
                      </div>
                      ${(item.seasons?.length > 0 || item.color || item.brand) ? `
                        <div class="item-meta">
                          ${item.seasons?.map(s => {
                            const season = SEASONS.find(se => se.id === s);
                            return `<span class="meta-tag">${season.emoji}</span>`;
                          }).join('') || ''}
                          ${item.color ? `<span class="meta-tag">${item.color}</span>` : ''}
                          ${item.brand ? `<span class="meta-tag">${item.brand}</span>` : ''}
                        </div>
                      ` : ''}
                    </div>
                  </div>
                `).join('')}
              </div>
            `}
          </main>
        </div>
      `;
    }

    function renderOutfit(season, currentOutfits, totalItems) {
      return `
        <div style="padding: 24px; padding-bottom: 60px;">
          <div style="display: flex; gap: 12px; margin-bottom: 36px; flex-wrap: wrap;">
            ${SEASONS.map(s => `
              <button 
                class="season-btn" 
                data-season="${s.id}"
                style="
                  flex: 1;
                  min-width: 140px;
                  padding: 20px 16px;
                  background: ${state.activeSeason === s.id ? 'var(--bg-tertiary)' : 'var(--bg-secondary)'};
                  border: 1px solid ${state.activeSeason === s.id ? s.color : 'var(--border-color)'};
                  border-radius: 4px;
                  text-align: center;
                  color: ${state.activeSeason === s.id ? s.color : 'var(--text-tertiary)'};
                "
              >
                <div style="font-size: 24px; margin-bottom: 6px;">${s.emoji}</div>
                <div style="font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300;">
                  ${s.label}
                </div>
                <div style="
                  font-family: 'Montserrat', sans-serif;
                  font-size: 9px;
                  letter-spacing: 0.3em;
                  margin-top: 2px;
                ">
                  ${s.en}
                </div>
              </button>
            `).join('')}
          </div>

          <div style="text-align: center; margin-bottom: 40px;">
            <button 
              class="ai-btn" 
              id="aiBtn"
              ${state.loading || totalItems < 2 ? 'disabled' : ''}
              style="
                padding: 16px 48px;
                background: ${state.loading ? 'var(--bg-secondary)' : 'linear-gradient(135deg, var(--accent-color), var(--accent-hover))'};
                color: ${state.loading ? 'var(--text-tertiary)' : 'var(--bg-primary)'};
                border-radius: 2px;
                font-family: 'Montserrat', sans-serif;
                font-size: 11px;
                font-weight: 600;
                letter-spacing: 0.15em;
              "
            >
              ${state.loading ? `<span class="pulse">✦ AI 코디 생성 중...</span>` : `✦ ${season.label} 코디 AI 추천받기`}
            </button>
            <button 
              class="add-item-btn" 
              id="aiReferenceBtn"
              style="margin: 12px auto 0; display: inline-flex;"
            >
              <span>📌</span>
              <span>참고 자료 추가</span>
            </button>
            ${totalItems < 2 ? `
              <div style="
                font-family: 'Montserrat', sans-serif;
                font-size: 10px;
                color: var(--text-tertiary);
                margin-top: 10px;
                letter-spacing: 0.15em;
              ">
                CLOSET에 아이템을 2개 이상 추가해주세요
              </div>
            ` : ''}
            ${(state.aiReference.images.length > 0 || state.aiReference.topColor || state.aiReference.bottomColor) ? `
              <div style="margin-top: 16px; text-align: left; max-width: 500px; margin-left: auto; margin-right: auto;">
                <div style="font-family: 'Montserrat', sans-serif; font-size: 9px; letter-spacing: 0.2em; color: var(--accent-color); margin-bottom: 8px;">
                  참고 자료 설정됨
                </div>
                ${state.aiReference.images.length > 0 ? `<div style="color: var(--text-secondary); font-size: 11px;">참고 이미지 ${state.aiReference.images.length}개</div>` : ''}
                ${state.aiReference.topColor ? `<div style="color: var(--text-secondary); font-size: 11px;">상의 색상: ${state.aiReference.topColor}</div>` : ''}
                ${state.aiReference.bottomColor ? `<div style="color: var(--text-secondary); font-size: 11px;">하의 색상: ${state.aiReference.bottomColor}</div>` : ''}
              </div>
            ` : ''}
          </div>

          ${currentOutfits.length > 0 ? `
            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;">
              ${currentOutfits.map((outfit, i) => `
                <div class="outfit-card" style="
                  background: var(--bg-secondary);
                  border: 1px solid ${season.color}22;
                  border-radius: 4px;
                  overflow: hidden;
                ">
                  <div style="
                    padding: 6px 16px;
                    background: ${season.color}15;
                    border-bottom: 1px solid ${season.color}22;
                  ">
                    <span style="
                      font-family: 'Montserrat', sans-serif;
                      font-size: 9px;
                      letter-spacing: 0.3em;
                      color: ${season.color};
                    ">
                      LOOK ${String(i + 1).padStart(2, '0')}
                    </span>
                  </div>
                  <div style="padding: 24px;">
                    <div style="
                      display: flex;
                      justify-content: space-between;
                      align-items: flex-start;
                      margin-bottom: 12px;
                    ">
                      <h3 style="
                        font-family: 'Cormorant Garamond', serif;
                        font-size: 22px;
                        font-weight: 400;
                      ">
                        ${outfit.title}
                      </h3>
                      <span style="
                        font-family: 'Montserrat', sans-serif;
                        font-size: 9px;
                        padding: 4px 10px;
                        border: 1px solid ${season.color}44;
                        color: ${season.color};
                        border-radius: 2px;
                        white-space: nowrap;
                        margin-left: 8px;
                      ">
                        ${outfit.style}
                      </span>
                    </div>
                    <p style="
                      font-family: 'Georgia', serif;
                      font-size: 13px;
                      color: var(--text-secondary);
                      line-height: 1.7;
                      margin-bottom: 20px;
                    ">
                      ${outfit.description}
                    </p>

                    <div style="margin-bottom: 16px;">
                      <div style="
                        font-family: 'Montserrat', sans-serif;
                        font-size: 9px;
                        letter-spacing: 0.25em;
                        color: var(--text-tertiary);
                        margin-bottom: 10px;
                      ">
                        ITEMS
                      </div>
                      <div style="display: flex; flex-wrap: wrap; gap: 6px;">
                        ${outfit.items.map(item => {
                          const [cat, ...nameParts] = item.split(':');
                          const name = nameParts.join(':') || cat;
                          const wardrobeItems = Object.values(state.wardrobe).flat();
                          const found = wardrobeItems.find(wi => wi.name === name.trim() || wi.category === cat.trim());
                          
                          return `
                            <div style="
                              display: flex;
                              align-items: center;
                              gap: 6px;
                              background: var(--bg-tertiary);
                              border-radius: 2px;
                              padding: 6px 10px;
                              border: 1px solid var(--border-color);
                            ">
                              ${found ? `<img src="${found.src}" alt="" style="width: 28px; height: 28px; object-fit: cover; border-radius: 2px;" />` : ''}
                              <div>
                                <div style="
                                  font-family: 'Montserrat', sans-serif;
                                  font-size: 8px;
                                  letter-spacing: 0.15em;
                                  color: ${season.color};
                                ">
                                  ${cat.trim()}
                                </div>
                                <div style="
                                  font-family: 'Montserrat', sans-serif;
                                  font-size: 10px;
                                  color: var(--text-primary);
                                ">
                                  ${name.trim()}
                                </div>
                              </div>
                            </div>
                          `;
                        }).join('')}
                      </div>
                    </div>

                    ${outfit.tip ? `
                      <div style="
                        padding: 12px;
                        background: ${season.color}08;
                        border-left: 2px solid ${season.color};
                        border-radius: 0 2px 2px 0;
                      ">
                        <div style="
                          font-family: 'Montserrat', sans-serif;
                          font-size: 9px;
                          letter-spacing: 0.2em;
                          color: ${season.color};
                          margin-bottom: 4px;
                        ">
                          STYLING TIP
                        </div>
                        <div style="
                          font-family: 'Georgia', serif;
                          font-size: 12px;
                          color: var(--text-secondary);
                          line-height: 1.6;
                        ">
                          ${outfit.tip}
                        </div>
                      </div>
                    ` : ''}
                  </div>
                </div>
              `).join('')}
            </div>
          ` : !state.loading ? `
            <div style="text-align: center; padding: 80px 0; color: var(--text-tertiary);">
              <div style="font-size: 48px; margin-bottom: 16px;">${season.emoji}</div>
              <div style="
                font-family: 'Cormorant Garamond', serif;
                font-size: 24px;
                font-weight: 300;
                margin-bottom: 8px;
              ">
                No Outfits Yet
              </div>
              <div style="
                font-family: 'Montserrat', sans-serif;
                font-size: 10px;
                letter-spacing: 0.25em;
              ">
                위 버튼을 눌러 ${season.label} 코디를 추천받으세요
              </div>
            </div>
          ` : ''}
        </div>
      `;
    }

    function renderCategories() {
      return `
        <div style="padding: 24px; padding-bottom: 60px;">
          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;">
            <div style="font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300;">
              Categories
            </div>
            <button class="add-item-btn" id="addCategoryBtn">
              <span style="font-size: 14px;">+</span>
              <span>ADD</span>
            </button>
          </div>

          <div style="font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 0.2em; color: var(--text-secondary); margin-bottom: 24px;">
            카테고리를 편집하면 옷장에 자동으로 반영됩니다
          </div>

          <div>
            ${state.categories.map(cat => `
              <div class="category-edit-item">
                <div style="font-size: 32px; flex-shrink: 0;">${cat.icon}</div>
                <div style="flex: 1;">
                  <div style="font-family: 'Montserrat', sans-serif; font-size: 13px; letter-spacing: 0.1em; color: var(--text-primary); margin-bottom: 4px;">
                    ${cat.label}
                  </div>
                  <div style="font-family: 'Montserrat', sans-serif; font-size: 9px; color: var(--text-tertiary);">
                    ${(state.wardrobe[cat.id] || []).length} items
                  </div>
                </div>
                <button class="edit-cat-btn" data-edit-cat="${cat.id}">✏️</button>
                ${state.categories.length > 1 ? `<button class="delete-cat-btn" data-delete-cat="${cat.id}">🗑️</button>` : ''}
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderSettings() {
      return `
        <div style="padding: 24px; padding-bottom: 60px;">
          <div style="font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; margin-bottom: 24px;">
            Settings
          </div>

          <div style="margin-bottom: 32px;">
            <label style="font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 0.15em; color: var(--text-secondary); display: block; margin-bottom: 16px;">
              THEME
            </label>
            <div class="theme-selector">
              ${THEMES.map(theme => `
                <button 
                  class="theme-option ${state.settings.theme === theme.id ? 'selected' : ''}"
                  data-theme="${theme.id}"
                  style="color: var(--text-primary);"
                >
                  <div style="font-size: 32px; margin-bottom: 8px;">${theme.emoji}</div>
                  <div style="font-family: 'Montserrat', sans-serif; font-size: 11px; letter-spacing: 0.1em;">
                    ${theme.label}
                  </div>
                </button>
              `).join('')}
            </div>
          </div>

          <div style="margin-bottom: 32px;">
            <div style="font-family: 'Montserrat', sans-serif; font-size: 10px; letter-spacing: 0.15em; color: var(--text-secondary); margin-bottom: 16px;">
              ACCOUNT
            </div>
            <div style="background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 4px; padding: 16px;">
              <div style="font-family: 'Montserrat', sans-serif; font-size: 11px; color: var(--text-primary); margin-bottom: 4px;">

    function attachAuthListeners() {
      const emailInput = document.getElementById('emailInput');
      const passwordInput = document.getElementById('passwordInput');
      const primaryBtn = document.getElementById('primaryAuthBtn');
      const googleBtn = document.getElementById('googleAuthBtn');
      const toggleBtn = document.getElementById('toggleAuthMode');

      emailInput.addEventListener('input', e => {
        state.email = e.target.value;
      });

      passwordInput.addEventListener('input', e => {
        state.password = e.target.value;
      });

      passwordInput.addEventListener('keypress', e => {
        if (e.key === 'Enter') {
          primaryBtn.click();
        }
      });

      primaryBtn.addEventListener('click', handleEmailAuth);
      googleBtn.addEventListener('click', handleGoogleAuth);
      toggleBtn.addEventListener('click', () => {
        state.authMode = state.authMode === 'login' ? 'signup' : 'login';
        state.error = '';
        render();
      });
    }

    async function handleEmailAuth() {
      state.error = '';
      try {
        if (state.authMode === 'login') {
          await signInWithEmailAndPassword(auth, state.email, state.password);
        } else {
          await createUserWithEmailAndPassword(auth, state.email, state.password);
        }
      } catch (error) {
        state.error = getErrorMessage(error.code);
        render();
      }
    }

    async function handleGoogleAuth() {
      state.error = '';
      try {
        await signInWithPopup(auth, googleProvider);
      } catch (error) {
        state.error = getErrorMessage(error.code);
        render();
      }
    }

    function getErrorMessage(code) {
      const messages = {
        'auth/email-already-in-use': '이미 사용 중인 이메일입니다.',
        'auth/invalid-email': '유효하지 않은 이메일 형식입니다.',
        'auth/operation-not-allowed': '이메일/비밀번호 로그인이 비활성화되어 있습니다.',
        'auth/weak-password': '비밀번호는 6자 이상이어야 합니다.',
        'auth/user-disabled': '비활성화된 계정입니다.',
        'auth/user-not-found': '존재하지 않는 계정입니다.',
        'auth/wrong-password': '비밀번호가 올바르지 않습니다.',
        'auth/invalid-credential': '이메일 또는 비밀번호가 올바르지 않습니다.',
        'auth/popup-closed-by-user': '로그인 창이 닫혔습니다.',
        'auth/cancelled-popup-request': '로그인이 취소되었습니다.'
      };
      return messages[code] || '오류가 발생했습니다. 다시 시도해주세요.';
    }

    function attachModalListeners() {
      const modalOverlay = document.getElementById('modalOverlay');
      const cancelBtn = document.getElementById('cancelModalBtn');

      if (modalOverlay) {
        modalOverlay.addEventListener('click', () => {
          state.modal = null;
          render();
        });
      }

      if (cancelBtn) {
        cancelBtn.addEventListener('click', () => {
          state.modal = null;
          render();
        });
      }

      if (state.modal === 'editCategory' || state.modal === 'addCategory') {
        const saveBtn = document.getElementById('saveModalBtn');
        const nameInput = document.getElementById('categoryNameInput');

        if (saveBtn) {
          saveBtn.addEventListener('click', saveCategory);
        }

        if (nameInput) {
          nameInput.addEventListener('input', e => {
            state.newCategoryName = e.target.value;
          });

          nameInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') {
              saveCategory();
            }
          });

          setTimeout(() => nameInput.focus(), 100);
        }

        document.querySelectorAll('.icon-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            state.newCategoryIcon = btn.dataset.icon;
            render();
          });
        });
      } else if (state.modal === 'addItem') {
        const uploadZone = document.getElementById('itemUploadZone');
        const imageInput = document.getElementById('itemImageInput');
        const nameInput = document.getElementById('itemNameInput');
        const colorInput = document.getElementById('itemColorInput');
        const brandInput = document.getElementById('itemBrandInput');
        const saveItemBtn = document.getElementById('saveItemBtn');

        if (uploadZone && imageInput) {
          uploadZone.addEventListener('click', () => imageInput.click());
          
          imageInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
              const reader = new FileReader();
              reader.onload = evt => {
                state.newItem.image = evt.target.result;
                render();
              };
              reader.readAsDataURL(file);
            }
          });
        }

        if (nameInput) {
          nameInput.addEventListener('input', e => {
            state.newItem.name = e.target.value;
          });
        }

        if (colorInput) {
          colorInput.addEventListener('input', e => {
            state.newItem.color = e.target.value;
          });
        }

        if (brandInput) {
          brandInput.addEventListener('input', e => {
            state.newItem.brand = e.target.value;
          });
        }

        document.querySelectorAll('.season-tag').forEach(btn => {
          btn.addEventListener('click', () => {
            const seasonId = btn.dataset.season;
            if (state.newItem.seasons.includes(seasonId)) {
              state.newItem.seasons = state.newItem.seasons.filter(s => s !== seasonId);
            } else {
              state.newItem.seasons.push(seasonId);
            }
            render();
          });
        });

        if (saveItemBtn) {
          saveItemBtn.addEventListener('click', saveItem);
        }
      } else if (state.modal === 'aiReference') {
        const uploadZone = document.getElementById('refUploadZone');
        const imageInput = document.getElementById('refImageInput');
        const topColorInput = document.getElementById('refTopColorInput');
        const bottomColorInput = document.getElementById('refBottomColorInput');
        const saveRefBtn = document.getElementById('saveRefBtn');

        if (uploadZone && imageInput) {
          uploadZone.addEventListener('click', () => imageInput.click());
          
          imageInput.addEventListener('change', e => {
            const files = Array.from(e.target.files);
            files.forEach(file => {
              if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = evt => {
                  state.aiReference.images.push(evt.target.result);
                  render();
                };
                reader.readAsDataURL(file);
              }
            });
            e.target.value = '';
          });
        }

        if (topColorInput) {
          topColorInput.addEventListener('input', e => {
            state.aiReference.topColor = e.target.value;
          });
        }

          bottomColorInput.addEventListener('input', e => {
            state.aiReference.bottomColor = e.target.value;
          });

          btn.addEventListener('click', () => {

            state.aiReference.images.splice(idx, 1);
            render();
          });
        });

        if (saveRefBtn) {
          saveRefBtn.addEventListener('click', () => {
            state.modal = null;
            saveToFirestore();
            render();
          });
        }
      }
    }

    function saveCategory() {
      const name = state.newCategoryName.trim().toUpperCase();
      
      if (!name) {
        alert('카테고리 이름을 입력해주세요.');
        return;
      }

      if (state.modal === 'editCategory') {
        const category = state.categories.find(c => c.id === state.editingCategory);
        const oldId = category.id;
        const newId = name;

        category.id = newId;
        category.label = name;
        category.icon = state.newCategoryIcon;

        if (oldId !== newId) {
          state.wardrobe[newId] = state.wardrobe[oldId] || [];
          delete state.wardrobe[oldId];
          if (state.activeCategory === oldId) {
            state.activeCategory = newId;
          }
          
          if (state.wardrobe[newId]) {
            state.wardrobe[newId].forEach(item => {
              item.category = newId;
            });
          }
        }
      } else {
        const exists = state.categories.find(c => c.id === name);
        if (exists) {
          alert('이미 존재하는 카테고리 이름입니다.');
          return;
        }

        state.categories.push({
          id: name,
          label: name,
          icon: state.newCategoryIcon
        });
        state.activeCategory = name;
      }

      state.modal = null;
      saveToFirestore();
      render();
    }

    async function saveItem() {
      if (!state.newItem.image || isSavingItem) {
        return;
      }

      // 저장 중 플래그 설정
      isSavingItem = true;
      render();

      const name = state.newItem.name.trim() || 'Untitled';

      // 새 아이템 데이터 복사본 생성
      const newItemData = {
        id: Date.now() + Math.random(),
        src: state.newItem.image,
        name: name,
        category: state.activeCategory,
        seasons: [...state.newItem.seasons],
        color: state.newItem.color.trim(),
        brand: state.newItem.brand.trim()
      };

      // State 업데이트 (로컬 먼저)
      if (!state.wardrobe[state.activeCategory]) {
        state.wardrobe[state.activeCategory] = [];
      }
      
      // 새 배열 생성하여 불변성 유지
      const updatedWardrobe = {
        ...state.wardrobe,
        [state.activeCategory]: [...state.wardrobe[state.activeCategory], newItemData]
      };

      state.wardrobe = updatedWardrobe;

      // 모달 닫고 newItem 초기화
      state.modal = null;
      state.newItem = {
        image: null,
        name: '',
        seasons: [],
        color: '',
        brand: ''
      };

      // 즉시 렌더링하여 사용자에게 표시
      isSavingItem = false;
      render();

      // 백그라운드에서 Firestore 저장
      try {
        const userDoc = doc(db, 'users', state.user.uid);
        await setDoc(userDoc, {
          wardrobe: updatedWardrobe,
          categories: state.categories,
          outfits: state.outfits,
          aiReference: state.aiReference,
          settings: state.settings,
          updatedAt: new Date().toISOString()
        }, { merge: true });
        
        console.log('Item saved successfully');
      } catch (error) {
        console.error('Save error:', error);
        alert(`저장 중 오류가 발생했습니다: ${error.message}`);
        // 저장 실패 시 해당 아이템 제거
        state.wardrobe[state.activeCategory] = state.wardrobe[state.activeCategory].filter(
          item => item.id !== newItemData.id
        );
        render();
      }
    }

    function removeItem(itemId) {
      if (!state.wardrobe[state.activeCategory]) return;
      
      state.wardrobe[state.activeCategory] = state.wardrobe[state.activeCategory].filter(
        item => item.id != itemId
      );
      saveToFirestore();
      render();
    }

    async function getAIOutfit() {
      const allItems = Object.entries(state.wardrobe).flatMap(([cat, items]) =>
        items.map(item => ({ category: cat, name: item.name, id: item.id }))
      );

      if (allItems.length < 2) {
        alert('옷장에 아이템을 2개 이상 추가해주세요!');
        return;
      }

      state.loading = true;
      render();

      try {
        const seasonInfo = SEASONS.find(s => s.id === state.activeSeason);
        
        let referenceText = '';
        if (state.aiReference.images.length > 0 || state.aiReference.topColor || state.aiReference.bottomColor) {
          referenceText = '\n\n참고 자료:';
          if (state.aiReference.images.length > 0) {
            referenceText += `\n- ${state.aiReference.images.length}개의 참고 코디 이미지가 제공되었습니다. 이 이미지들의 스타일과 조합을 참고하세요.`;
          }
          if (state.aiReference.topColor && state.aiReference.bottomColor) {
            referenceText += `\n- 선호 색상 조합: 상의 ${state.aiReference.topColor}, 하의 ${state.aiReference.bottomColor}`;
          } else if (state.aiReference.topColor) {
            referenceText += `\n- 상의 색상: ${state.aiReference.topColor}`;
          } else if (state.aiReference.bottomColor) {
            referenceText += `\n- 하의 색상: ${state.aiReference.bottomColor}`;
          }
        }

        const prompt = `당신은 한국의 패션 스타일리스트입니다. 아래 옷장 아이템 목록을 보고 ${seasonInfo.label} 시즌에 어울리는 코디를 추천해주세요.${referenceText}

옷장 아이템:
${allItems.map(i => `- [${i.category}] ${i.name}`).join('\n')}

다음 JSON 형식으로만 응답하세요 (마크다운 없이):
{
  "outfits": [
    {
      "title": "코디 이름 (예: 캐주얼 데일리룩)",
      "style": "스타일 키워드 (예: 캐주얼, 미니멀, 스트리트)",
      "items": ["카테고리:아이템명", ...],
      "description": "이 코디에 대한 간단한 설명 (2-3문장)",
      "tip": "스타일링 팁 한 가지"
    }
  ]
}

${seasonInfo.label} 시즌의 날씨와 분위기에 맞게 최대 3가지 코디를 추천해주세요. 반드시 위 옷장에 있는 아이템만 사용하세요.${referenceText ? ' 제공된 참고 자료의 스타일과 색상 조합을 최대한 반영해주세요.' : ''}`;

        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            messages: [{ role: 'user', content: prompt }]
          })
        });

        const data = await res.json();
        const text = data.content.map(c => c.text || '').join('');
        const clean = text.replace(/```json|```/g, '').trim();
        const parsed = JSON.parse(clean);

        state.outfits[state.activeSeason] = parsed.outfits;
        saveToFirestore();
      } catch (err) {
        console.error(err);
        alert('AI 추천 중 오류가 발생했습니다. 다시 시도해주세요.');
      } finally {
        state.loading = false;
        render();
      }
    }

    async function handleLogout() {
      try {
        await signOut(auth);
      } catch (error) {
        console.error('Logout error:', error);
      }
    }

    async function saveToFirestore() {
      if (!state.user || state.syncing) return;
      
      try {
        state.syncing = true;
        const userDoc = doc(db, 'users', state.user.uid);
        await setDoc(userDoc, {
          categories: state.categories,
          wardrobe: state.wardrobe,
          outfits: state.outfits,
          aiReference: state.aiReference,
          settings: state.settings,
          updatedAt: new Date().toISOString()
        }, { merge: true });
      } catch (error) {
        console.error('Save error:', error);
      } finally {
        state.syncing = false;
      }
    }

    function setupFirestoreSync(userId) {
      if (unsubscribeFirestore) {
        unsubscribeFirestore();
      }

      const userDoc = doc(db, 'users', userId);
      
      // 실시간 동기화 설정
      unsubscribeFirestore = onSnapshot(userDoc, snapshot => {
        if (snapshot.exists()) {
          const data = snapshot.data();
          
          // 로컬 state와 비교하여 필요한 경우만 업데이트
          const hasChanges = 
            JSON.stringify(data.wardrobe) !== JSON.stringify(state.wardrobe) ||
            JSON.stringify(data.categories) !== JSON.stringify(state.categories) ||
            JSON.stringify(data.outfits) !== JSON.stringify(state.outfits);

          if (hasChanges) {
            console.log('Syncing from Firestore');
            state.categories = data.categories || [...DEFAULT_CATEGORIES];
            state.wardrobe = data.wardrobe || {};
            state.outfits = data.outfits || {};
            state.aiReference = data.aiReference || { images: [], topColor: '', bottomColor: '' };
            state.settings = data.settings || { theme: 'dark' };
            
            applyTheme(state.settings.theme);
            
            if (!state.categories.find(c => c.id === state.activeCategory)) {
              state.activeCategory = state.categories[0]?.id || 'TOPS';
            }
            
            render();
          }
        }
      }, error => {
        console.error('Firestore sync error:', error);
        alert(`동기화 오류: ${error.message}\n\n앱을 다시 로드해주세요.`);
      });
    }

    onAuthStateChanged(auth, async user => {
      state.user = user;
      
      if (user) {
        // 초기 데이터 로드
        try {
          const userDoc = doc(db, 'users', user.uid);
          const snapshot = await getDoc(userDoc);
          
          if (snapshot.exists()) {
            const data = snapshot.data();
            state.categories = data.categories || [...DEFAULT_CATEGORIES];
            state.wardrobe = data.wardrobe || {};
            state.outfits = data.outfits || {};
            state.aiReference = data.aiReference || { images: [], topColor: '', bottomColor: '' };
            state.settings = data.settings || { theme: 'dark' };
            
            applyTheme(state.settings.theme);
            
            if (!state.categories.find(c => c.id === state.activeCategory)) {
              state.activeCategory = state.categories[0]?.id || 'TOPS';
            }
          }
        } catch (error) {
          console.error('Initial load error:', error);
        }
        
        render();
        
        // 실시간 동기화 시작
        setupFirestoreSync(user.uid);
      } else {
        if (unsubscribeFirestore) {
          unsubscribeFirestore();
          unsubscribeFirestore = null;
        }
        state.categories = [...DEFAULT_CATEGORIES];
        state.wardrobe = {};
        state.outfits = {};
        state.aiReference = { images: [], topColor: '', bottomColor: '' };
        state.settings = { theme: 'dark' };
        applyTheme('dark');
        render();
      }
    });

    applyTheme(state.settings.theme);
    render();
  </script>
</body>
</html>
